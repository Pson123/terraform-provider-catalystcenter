---
name: Wireless CleanAir Configuration
rest_endpoint: /dna/intent/api/v1/featureTemplates/wireless/cleanAirConfigurations
id_path: response.data
put_id: true
mutex: true
res_description: This resource manages a Wireless CleanAir Configuration feature template. CleanAir feature templates define spectrum-intelligence settings (per radio band) that detect and classify RF interferers, and can be attached to wireless network profiles.
doc_category: Wireless
test_tags: [CC315]
attributes:
  - model_name: designName
    type: String
    mandatory: true
    description: The name of the CleanAir feature template. Forbidden characters are `% & < > [ ] ' /`.
    string_max_length: 64
    string_min_length: 1
    example: cleanAir_802_11b_custom
    response_data_path: response.designName
  - model_name: radioBand
    data_path: featureAttributes
    response_data_path: response.featureAttributes.radioBand
    type: String
    mandatory: true
    enum_values: [2_4GHZ, 5GHZ, 6GHZ]
    description: The radio band the CleanAir configuration applies to.
    example: 2_4GHZ
  - model_name: cleanAir
    data_path: featureAttributes
    response_data_path: response.featureAttributes.cleanAir
    type: Bool
    description: Enable CleanAir spectrum intelligence on the radio band.
    example: true
  - model_name: cleanAirDeviceReporting
    data_path: featureAttributes
    response_data_path: response.featureAttributes.cleanAirDeviceReporting
    type: Bool
    description: Enable reporting of CleanAir interferer devices.
    example: true
  - model_name: persistentDevicePropagation
    data_path: featureAttributes
    response_data_path: response.featureAttributes.persistentDevicePropagation
    type: Bool
    description: Enable persistent device propagation.
    example: true
  - model_name: description
    data_path: featureAttributes
    response_data_path: response.featureAttributes.description
    type: String
    description: Description of the CleanAir feature template.
    example: CleanAir template for 2.4GHz
    exclude_test: true
  - model_name: unlockedAttributes
    type: List
    element_type: String
    response_data_path: response.unlockedAttributes
    description: List of feature attributes that are unlocked (editable) for this template.
    example: cleanAir
    exclude_test: true
  - model_name: bleBeacon
    data_path: featureAttributes.interferersFeatures
    response_data_path: response.featureAttributes.interferersFeatures.bleBeacon
    type: Bool
    description: Detect BLE Beacon interferers. Applicable to 2.4GHz and 5GHz.
    example: true
  - model_name: bluetoothPagingInquiry
    data_path: featureAttributes.interferersFeatures
    response_data_path: response.featureAttributes.interferersFeatures.bluetoothPagingInquiry
    type: Bool
    description: Detect Bluetooth Paging Inquiry interferers. Applicable to 2.4GHz.
    example: true
  - model_name: bluetoothScoAcl
    data_path: featureAttributes.interferersFeatures
    response_data_path: response.featureAttributes.interferersFeatures.bluetoothScoAcl
    type: Bool
    description: Detect Bluetooth SCO and ACL interferers. Applicable to 2.4GHz.
    example: true
  - model_name: continuousTransmitter
    data_path: featureAttributes.interferersFeatures
    response_data_path: response.featureAttributes.interferersFeatures.continuousTransmitter
